<header class="site-header no-print">
  <div class="nav-inner">
    <a href="{{ url_for('home') }}" class="nav-logo">
      <div class="nav-logo-box">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
          <rect x="3" y="7" width="12" height="8" rx="1" fill="{{ theme.primary }}"/>
          <path d="M6 7V5.5C6 3.6 7.3 2 9 2C10.7 2 12 3.6 12 5.5V7" stroke="{{ theme.gold }}" stroke-width="2" stroke-linecap="round" fill="none"/>
          <circle cx="9" cy="11" r="1.5" fill="{{ theme.border_dark }}"/>
        </svg>
      </div>
      <span class="nav-logo-text">CipherFlow</span>
    </a>

    <nav class="nav-desktop">
      <a href="{{ url_for('home') }}" class="{% if request.endpoint == 'home' %}active{% endif %}">Beranda</a>
      <a href="{{ url_for('simulator') }}" class="{% if request.endpoint == 'simulator' %}active{% endif %}">Simulator</a>
      <a href="{{ url_for('docs') }}" class="{% if request.endpoint == 'docs' %}active{% endif %}">Referensi</a>
      <a href="{{ url_for('simulator') }}" class="btn-brutal" style="background:{{ theme.primary_dark }};color:{{ theme.text }};padding:8px 20px;font-size:0.8rem;">Mulai Enkripsi</a>
    </nav>

    <button class="nav-hamburger" id="nav-toggle" aria-label="Toggle menu">
      <svg id="icon-menu" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="{{ theme.primary }}" stroke-width="3"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
      <svg id="icon-close" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="{{ theme.primary }}" stroke-width="3" style="display:none"><path d="M6 6l12 12M18 6L6 18"/></svg>
    </button>
  </div>

  <nav class="nav-mobile" id="nav-mobile">
    <a href="{{ url_for('home') }}">Beranda</a>
    <a href="{{ url_for('simulator') }}">Simulator</a>
    <a href="{{ url_for('docs') }}">Referensi</a>
    <a href="{{ url_for('simulator') }}" class="btn-brutal" style="background:{{ theme.primary_dark }};color:{{ theme.text }};padding:12px 20px;font-size:0.9rem;">Mulai Enkripsi →</a>
  </nav>
</header>
